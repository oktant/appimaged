name: Build & Release appimaged

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build Linux binary
        run: |
          mkdir -p dist
          go build -o dist/appimaged main.go

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimaged
          path: dist/appimaged

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: appimaged
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/appimaged
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}